<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolnestHQ | جميع الأدوات في مكان واحد</title>
    <style>
        :root { --bg: #070a13; --accent: #3b82f6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 20px; }
        .nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 18px; cursor: pointer; border-radius: 10px; background: #1e293b; color: white; border: 1px solid #334155; transition: 0.3s; }
        button:hover { background: var(--accent); }
        .tool-section { display: none; padding: 25px; background: rgba(255,255,255,0.03); border-radius: 20px; max-width: 600px; margin: auto; }
        .active { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #111; color: white; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">ToolnestHQ</h1>
    <div class="nav">
        <button onclick="show('pwd')">كلمات السر</button>
        <button onclick="show('qr')">الباركود</button>
        <button onclick="show('conv')">المحول</button>
        <button onclick="show('age')">العمر</button>
        <button onclick="show('wts')">واتساب</button>
        <button onclick="show('text')">النصوص</button>
        <button onclick="show('disc')">الخصم</button>
    </div>

    <div id="pwd" class="tool-section active"><h3>🔑 مولد كلمات السر</h3><input type="text" placeholder="كلمة السر ستظهر هنا..."></div>
    <div id="qr" class="tool-section"><h3>📱 صانع الباركود</h3><input type="text" placeholder="أدخل الرابط..."></div>
    <div id="conv" class="tool-section"><h3>🔄 محول الوحدات</h3><input type="text" placeholder="القيمة..."></div>
    <div id="age" class="tool-section"><h3>⏳ حاسبة العمر</h3><input type="date"></div>
    <div id="wts" class="tool-section"><h3>💬 رابط واتساب</h3><input type="text" placeholder="رقم الجوال..."></div>
    <div id="text" class="tool-section"><h3>📝 عداد النصوص</h3><textarea placeholder="اكتب نصك هنا..."></textarea></div>
    <div id="disc" class="tool-section"><h3>💰 حاسبة الخصم</h3><input type="number" placeholder="السعر الأصلي..."></div>

    <script>
        function show(id) {
            document.querySelectorAll('.tool-section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
