<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolnestHQ | بوابتك للأدوات الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070a13;
            --accent: #3b82f6;
            --text: #ffffff;
            --muted: #64748b;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        .hero { text-align: center; padding: 60px 20px; }
        h1 { font-size: 2.8rem; margin-bottom: 10px; }
        h1 span { color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1100px; width: 90%; margin: 0 auto 80px; }
        .card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(59, 130, 246, 0.05); }
        .card h3 { font-size: 1.3rem; margin-bottom: 10px; }
        .card p { color: var(--muted); font-size: 0.95rem; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>مرحباً بك في <span>ToolnestHQ</span></h1>
        <p>مجموعة الأدوات التي تحتاجها يومياً في مكان واحد</p>
    </header>

    <main class="grid">
        <a href="whatsapp-link.html" class="card">
            <h3>💬 رابط واتساب المباشر</h3>
            <p>أنشئ رابطاً لبدء المحادثة فوراً بدون حفظ الأرقام.</p>
        </a>
        <a href="text-counter.html" class="card">
            <h3>📝 عداد ومحلل النصوص</h3>
            <p>تحليل دقيق للكلمات، الحروف، وزمن القراءة.</p>
        </a>
        <a href="discount.html" class="card">
            <h3>💰 حاسبة الخصم والضريبة</h3>
            <p>احسب السعر النهائي بعد الخصومات والضرائب بدقة.</p>
        </a>
    </main>

</body>
</html>
