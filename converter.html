<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحول - ToolNestHQ</title>
    <style>
        body { font-family: sans-serif; background-color: #060813; color: white; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>محول الأطوال (متر إلى سم)</h1>
    <input type="number" id="meters" placeholder="أدخل الطول بالمتر">
    <br>
    <button onclick="convert()">تحويل</button>
    <h2 id="result"></h2>

    <script>
        function convert() {
            const meters = document.getElementById("meters").value;
            const cm = meters * 100;
            document.getElementById("result").innerHTML = meters + " متر = " + cm + " سم";
        }
    </script>
    <br>
    <a href="index.html" style="color: #aaa;">العودة للرئيسية</a>

</body>
</html>
