<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolnestHQ - المنصة الاحترافية للأدوات الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-glow blob-1"></div>
    <div class="bg-glow blob-2"></div>

    <div class="container">
        <header class="main-header">
            <h1 class="brand-title">Toolnest<span>HQ</span></h1>
            <p class="brand-subtitle">القوة التقنية في متناول يدك</p>
        </header>

        <main class="tools-grid">
            
            <a href="Password.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-key"></i>
                </div>
                <span class="tool-name">كلمات السر</span>
            </a>

            <a href="qr.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <span class="tool-name">الباركود</span>
            </a>

            <a href="converter.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                </div>
                <span class="tool-name">المحول</span>
            </a>

            <a href="age.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-hourglass-half"></i>
                </div>
                <span class="tool-name">العمر</span>
            </a>

            <a href="whatsapp.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <span class="tool-name">واتساب</span>
            </a>

            <a href="text-counter.html" class="tool-card">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-file-lines"></i>
                </div>
                <span class="tool-name">النصوص</span>
            </a>

            <a href="discount.html" class="tool-card full-width">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <span class="tool-name">حاسبة الخصم</span>
            </a>

        </main>

        <footer class="display-container">
            <div class="display-content">
                <i class="fa-solid fa-wand-magic-sparkles display-icon"></i>
                <h2>اختر أداة للبدء</h2>
                <p>جميع الأدوات تعمل بشكل مستقل وسريع وآمن تماماً</p>
            </div>
        </footer>
    </div>

</body>
</html>
