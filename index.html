<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNestHQ - لوحة الأدوات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-pure: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #060813;
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .color-bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(120px);
            opacity: 0.4;
        }

        .color-blob-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1e3a8a 0%, transparent 70%);
            top: -10%; left: -10%;
            animation: wave1 20s infinite alternate ease-in-out;
        }

        .color-blob-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #4c1d95 0%, transparent 70%);
            bottom: -20%; right: -10%;
            animation: wave2 25s infinite alternate ease-in-out;
        }

        @keyframes wave1 { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 50px); } }
        @keyframes wave2 { 0% { transform: translate(0, 0); } 100% { transform: translate(-80px, -60px); } }

        .tools-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            width: 100%;
            max-width: 900px;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 28px;
            padding: 45px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            flex: 1;
            min-width: 280px;
            max-width: 360px;
            box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
        }

        .card-icon {
            font-size: 55px;
            margin-bottom: 22px;
        }

        .title-ar {
            margin: 0; font-size: 24px; font-weight: 700; display: block;
        }

        .title-en {
            margin: 6px 0 16px 0; font-size: 18px; font-weight: 600; display: block; opacity: 0.8;
        }

        .glass-card p {
            color: var(--text-dim); margin: 0; font-size: 14px; line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="color-bg-glow">
        <div class="color-blob-1"></div>
        <div class="color-blob-2"></div>
    </div>

    <div class="tools-grid">
        <!-- كرت يفتح صفحة الباركود المستقلة -->
        <a href="qr.html" class="glass-card">
            <div class="card-icon"><i class="fa-solid fa-qrcode"></i></div>
            <span class="title-ar">صانع الباركود</span>
            <span class="title-en">(QR Code)</span>
            <p>أنشئ رموز QR مخصصة لروابطك ونصوصك بسهولة وبأعلى دقة</p>
        </a>

        <!-- كرت يفتح صفحة حاسبة العمر المستقلة -->
        <a href="age.html" class="glass-card">
            <div class="card-icon"><i class="fa-solid fa-calculator"></i></div>
            <span class="title-ar">حاسبة العمر</span>
            <span class="title-en">(Age Calculator)</span>
            <p>احسب عمرك بالتفصيل بالسنوات، الأشهر، والأيام بلمحة عين</p>
        </a>
    </div>

</body>
</html>
