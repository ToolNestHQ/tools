<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - ToolNestHQ</title>
    <style>
        body { font-family: sans-serif; background-color: #060813; color: white; text-align: center; padding: 20px; }
        input { padding: 10px; width: 80%; max-width: 300px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>حاسبة العمر</h1>
    <label>اختر تاريخ ميلادك:</label><br>
    <input type="date" id="dob">
    <br>
    <button onclick="calculateAge()">احسب عمري</button>
    <h2 id="result"></h2>

    <script>
        function calculateAge() {
            const dob = new Date(document.getElementById("dob").value);
            const today = new Date();
            let age = today.getFullYear() - dob.getFullYear();
            const m = today.getMonth() - dob.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) { age--; }
            document.getElementById("result").innerHTML = "عمرك هو: " + age + " سنة";
        }
    </script>
    <br>
    <a href="index.html" style="color: #aaa;">العودة للرئيسية</a>

</body>
</html>
