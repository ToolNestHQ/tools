<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNestHQ - أدوات رقمية مجانية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            padding: 60px 20px;
            background: radial-gradient(circle at top, rgba(99, 102, 241, 0.15) 0%, transparent 60%);
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header p {
            color: var(--text-muted);
            font-size: 18px;
        }

        .container {
            max-width: 600px; /* تقليص العرض ليناسب أداة واحدة بشكل أنيق */
            margin: 0 auto;
            padding: 0 20px 60px;
            box-sizing: border-box;
            width: 100%;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.2);
        }

        .card-icon {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0 0 12px 0;
            font-size: 22px;
        }

        .card p {
            color: var(--text-muted);
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
        }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            border-top: 1px solid #1e293b;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fa-solid fa-cubes" style="color: var(--accent);"></i> ToolNestHQ</h1>
        <p>صندوق أدواتك الذكي والمجاني لإنجاز مهامك اليومية بذكاء وسرعة</p>
    </div>

    <div class="container">
        
        <!-- كرت أداة الباركود المربوط بالصفحة المستقلة المخصصة لها فقط -->
        <a href="qr.html" class="card">
            <div class="card-icon"><i class="fa-solid fa-qrcode"></i></div>
            <h3>صانع الباركود (QR Code)</h3>
            <p>أنشئ رموز QR مخصصة لروابطك ونصوصك بسهولة وبأعلى جودة</p>
        </a>

    </div>

    <footer>
        &copy; 2026 ToolNestHQ. جميع الحقوق محفوظة.
    </footer>

</body>
</html>
