<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مولد وسوم الميتا | Meta Tag Generator | ToolnestHQ</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{

background:#09090b;
color:white;
padding:30px;

}

.container{

max-width:900px;
margin:auto;

}

.card{

background:#151515;
border:1px solid #2d2d2d;
border-radius:18px;
padding:25px;

}

h1{

font-size:34px;
text-align:center;
margin-bottom:10px;

}

.subtitle{

text-align:center;
color:#9ca3af;
margin-bottom:35px;

}

label{

display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:bold;

}

input,textarea{

width:100%;
padding:15px;
border:none;
outline:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;

}

textarea{

height:120px;
resize:vertical;

}

button{

width:100%;
margin-top:30px;
padding:16px;
border:none;
border-radius:12px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#1d4ed8;

}

#output{

margin-top:30px;
background:#0f172a;
padding:20px;
border-radius:12px;
white-space:pre-wrap;
overflow:auto;
display:none;

}
.buttons{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.buttons button{
flex:1;
background:#222;
color:#fff;
border:1px solid #333;
}

.buttons button:hover{
background:#2563eb;
}
</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>مولد وسوم الميتا</h1>

<p class="subtitle">
Meta Tag Generator | ToolnestHQ
</p>

<label>عنوان الموقع | Website Title</label>

<input id="title">

<label>وصف الموقع | Description</label>

<textarea id="description"></textarea>

<label>الكلمات المفتاحية | Keywords</label>

<input id="keywords">

<label>اسم المؤلف | Author</label>

<input id="author">
<label>رابط الموقع | Website URL</label>

<input id="url" placeholder="https://example.com">

<label>رابط صورة الموقع | Image URL</label>

<input id="image" placeholder="https://example.com/image.jpg">

<label>اسم مستخدم X (Twitter)</label>

<input id="twitter" placeholder="@ToolnestHQ">
<button onclick="generate()">

إنشاء Meta Tags

</button>

<pre id="output"></pre>
<div class="buttons">

<button onclick="copyCode()">📋 نسخ الكود</button>

<button onclick="downloadCode()">💾 تحميل الملف</button>

<button onclick="clearFields()">🗑️ مسح الحقول</button>

</div>
</div>

</div>

<script>

function generate(){

let title=document.getElementById("title").value;
let description=document.getElementById("description").value;
let keywords=document.getElementById("keywords").value;
let author=document.getElementById("author").value;

let meta=`<title>${title}</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="title" content="${title}">
<meta name="description" content="${description}">
<meta name="keywords" content="${keywords}">
<meta name="author" content="${author}">
<meta name="robots" content="index, follow">
<meta name="language" content="Arabic">
<meta name="revisit-after" content="7 days">
<meta name="rating" content="General">

<!-- Open Graph -->

<meta property="og:title" content="${title}">
<meta property="og:description" content="${description}">
<meta property="og:type" content="website">
<meta property="og:locale" content="ar_SA">

<!-- Twitter -->

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="${title}">
<meta name="twitter:description" content="${description}">`;

document.getElementById("output").style.display="block";
document.getElementById("output").textContent=meta;

}
function copyCode(){

const code=document.getElementById("output").textContent;

if(code===""){
alert("قم بإنشاء Meta Tags أولاً");
return;
}

navigator.clipboard.writeText(code);

alert("✅ تم نسخ الكود");

}

function downloadCode(){

const code=document.getElementById("output").textContent;

if(code===""){
alert("قم بإنشاء Meta Tags أولاً");
return;
}

const blob=new Blob([code],{type:"text/html"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="meta-tags.html";

a.click();

}

function clearFields(){

document.getElementById("title").value="";
document.getElementById("description").value="";
document.getElementById("keywords").value="";
document.getElementById("author").value="";
document.getElementById("output").textContent="";
document.getElementById("output").style.display="none";

}
</script>

</body>
</html>
