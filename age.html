<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #030712; /* أسود فضائي عميق */
            --card-bg: #0b0f19; /* رمادي داكن جداً للكرت */
            --neon-cyan: #00f2fe; /* أزرق سيبراني مضيء */
            --neon-purple: #4facfe; /* متدرج إلكتروني */
            --text-pure: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* زر الرجوع للرئيسية بستايل سيبراني هادئ */
        .back-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            color: var(--text-pure);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            transform: translateX(3px);
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* كرت بحدود مضيئة متحركة */
        .age-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* تأثير خط التوهج النيوني المحيط بالكرت */
        .age-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-purple), transparent);
            border-radius: 26px;
            z-index: -1;
            background-size: 200% 200%;
            animation: auroraBorder 6s linear infinite;
            opacity: 0.5;
        }

        @keyframes auroraBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .icon-header {
            font-size: 50px;
            margin-bottom: 15px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 10px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* حقل الإدخال السيبراني */
        input[type="date"] {
            width: 100%;
            padding: 15px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="date"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
            background: #1f2937;
        }

        /* زر الحساب المضيء */
        .calc-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
            border: none;
            border-radius: 14px;
            color: #030712;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
        }

        .calc-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
            opacity: 0.95;
        }

        /* كروت عرض النتيجة النيونية */
        .result-box {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: none;
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 15px;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .result-item {
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 15px 5px;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            border-color: rgba(0, 242, 254, 0.3);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.05);
        }

        .result-num {
            font-size: 26px;
            font-weight: 800;
            color: var(--neon-cyan);
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
        }

        .result-label {
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-right"></i> الرئيسية
    </a>

    <div class="container">
        <div class="age-card">
            <div class="icon-header"><i class="fa-solid fa-microchip"></i></div>
            <h2>حاسبة العمر الذكية</h2>
            <div class="subtitle">حلل بيانات ميلادك واحسب عمرك بالثانية والدقيقة ولمح البصر</div>

            <div class="input-group">
                <label for="birthdate">أدخل تاريخ ميلادك الموقر:</label>
                <input type="date" id="birthdate" required>
            </div>

            <button class="calc-btn" onclick="calculateAge()">ابدأ التحليل المباشر</button>

            <div class="result-box" id="resultBox">
                <div class="result-title">نتائج تحليل العمر الحالي:</div>
                <div class="result-grid">
                    <div class="result-item">
                        <div class="result-num" id="years">-</div>
                        <div class="result-label">سنة</div>
                    </div>
                    <div class="result-item">
                        <div class="result-num" id="months">-</div>
                        <div class="result-label">شهر</div>
                    </div>
                    <div class="result-item">
                        <div class="result-num" id="days">-</div>
                        <div class="result-label">يوم</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            if (!birthdateInput) {
                alert('الرجاء اختيار تاريخ الميلاد أولاً!');
                return;
            }

            const birthDate = new Date(birthdateInput);
            const today = new Date();

            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
                days += previousMonth;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('years').innerText = years;
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;
            document.getElementById('resultBox').style.style.display = 'block';
        }
    </script>

</body>
</html>
