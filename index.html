<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolnestHQ | الواجهة الجبارة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .nav-btn { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .nav-btn:hover { transform: scale(1.05); background: #3b82f6; }
        .tool-box { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500 mb-2">ToolnestHQ</h1>
            <p class="text-slate-400">القوة التقنية في متناول يدك</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <button onclick="show('pwd')" class="nav-btn glass p-4 rounded-2xl">🔑 كلمات السر</button>
            <button onclick="show('qr')" class="nav-btn glass p-4 rounded-2xl">📱 الباركود</button>
            <button onclick="show('conv')" class="nav-btn glass p-4 rounded-2xl">🔄 المحول</button>
            <button onclick="show('age')" class="nav-btn glass p-4 rounded-2xl">⏳ العمر</button>
            <button onclick="show('wts')" class="nav-btn glass p-4 rounded-2xl">💬 واتساب</button>
            <button onclick="show('text')" class="nav-btn glass p-4 rounded-2xl">📝 النصوص</button>
            <button onclick="show('disc')" class="nav-btn glass p-4 rounded-2xl col-span-2">💰 حاسبة الخصم</button>
        </div>

        <div id="display-area" class="glass glow p-8 rounded-3xl min-h-[300px] flex items-center justify-center border-t-4 border-blue-500">
            <div id="pwd" class="tool-box hidden w-full">
                <h3 class="text-2xl mb-4 font-bold">مولد كلمات السر</h3>
                <input class="w-full bg-black/50 p-4 rounded-xl border border-white/10" placeholder="اضغط توليد...">
            </div>
            <div id="wts" class="tool-box hidden w-full">
                <h3 class="text-2xl mb-4 font-bold">رابط واتساب</h3>
                <input class="w-full bg-black/50 p-4 rounded-xl border border-white/10" placeholder="أدخل الرقم هنا...">
            </div>
            <div id="welcome" class="text-center text-slate-500">
                <h2 class="text-2xl">اختر أداة للبدء</h2>
            </div>
        </div>
    </div>

    <script>
        function show(id) {
            document.getElementById('welcome').classList.add('hidden');
            document.querySelectorAll('.tool-box').forEach(t => t.classList.add('hidden'));
            const selected = document.getElementById(id);
            selected.classList.remove('hidden');
        }
    </script>
</body>
</html>
