<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الباركود - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- مكتبة توليد الـ QR الموثوقة لتجنب الأخطاء البرمجية -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-dark: #030712; /* أسود فضائي عميق */
            --card-bg: #0b0f19; /* رمادي داكن جداً للكرت */
            --neon-cyan: #00f2fe; /* أزرق سيبراني مضيء */
            --neon-purple: #4facfe; /* متدرج إلكتروني */
            --text-pure: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* زر الرجوع للرئيسية بستايل سيبراني هادئ ومضمون */
        .back-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 18px;
            border-radius: 12px;
            color: var(--text-pure);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
            transform: translateX(3px);
        }

        .container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* كرت بحدود مضيئة متحركة تطابق صفحة العمر */
        .qr-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .qr-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-purple), transparent);
            border-radius: 26px;
            z-index: -1;
            background-size: 200% 200%;
            animation: auroraBorder 6s linear infinite;
            opacity: 0.5;
        }

        @keyframes auroraBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .icon-header {
            font-size: 50px;
            margin-bottom: 15px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 10px;
            color: var(--text-dim);
        }

        /* حقل إدخال النص السيبراني */
        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #ffffff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.15);
            background: #1f2937;
        }

        /* زر التوليد المضيء */
        .gen-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-purple) 100%);
            border: none;
            border-radius: 14px;
            color: #030712;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            margin-bottom: 25px;
        }

        .gen-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.5);
            opacity: 0.95;
        }

        /* حاوية عرض الباركود الناتجة */
        .result-box {
            display: none;
            justify-content: center;
            align-items: center;
            background: #ffffff;
            padding: 20px;
            border-radius: 20px;
            margin: 0 auto;
            max-width: 200px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.15);
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- يرجع للصفحة الرئيسية الموحدة بسلام وأمان -->
    <a href="index.html" class="back-btn">
        <i class="fa-solid fa-arrow-right"></i> الرئيسية
    </a>

    <div class="container">
        <div class="qr-card">
            <div class="icon-header"><i class="fa-solid fa-qrcode"></i></div>
            <h2>صانع الباركود الذكي</h2>
            <div class="subtitle">حوّل أي رابط أو نص إلى رمز QR فوري بدقة عالية</div>

            <div class="input-group">
                <label for="textInput">أدخل الرابط أو النص المراد تحويله:</label>
                <input type="text" id="textInput" placeholder="https://example.com" autocomplete="off">
            </div>

            <button class="gen-btn" onclick="generateQR()">توليد الرمز المباشر</button>

            <!-- هنا يظهر الباركود المولد -->
            <div class="result-box" id="qrResult"></div>
        </div>
    </div>

    <script>
        function generateQR() {
            const textData = document.getElementById('textInput').value.trim();
            const qrResultDiv = document.getElementById('qrResult');
            
            // تنظيف الحاوية قبل التوليد الجديد
            qrResultDiv.innerHTML = "";

            if (!textData) {
                alert('الرجاء كتابة رابط أو نص أولاً!');
                qrResultDiv.style.display = 'none';
                return;
            }

            // توليد الباركود داخل الحاوية بنجاح
            new QRCode(qrResultDiv, {
                text: textData,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // إظهار الحاوية البيضاء بشكل فخم
            qrResultDiv.style.display = 'flex';
        }
    </script>

</body>
</html>
