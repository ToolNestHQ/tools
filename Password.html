<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد كلمات المرور الآمنة | ToolnestHQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #070a13;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.06);
            --text-main: #ffffff;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            --hover-glow: rgba(124, 58, 237, 0.25);
            --font-ar: 'Cairo', sans-serif;
            --font-en: 'Poppins', sans-serif;
            
            /* ألوان مقياس القوة */
            --weak: #ef4444;
            --medium: #f59e0b;
            --strong: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: var(--font-ar);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(37, 99, 235, 0.06), transparent 30%),
                radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.06), transparent 30%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        html[lang="en"] body {
            font-family: var(--font-en);
        }

        /* شريط التنقل العلوي */
        nav {
            width: 100%;
            max-width: 800px;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .lang-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--hover-glow);
        }

        /* الحاوية الرئيسية للأداة */
        .container {
            width: 100%;
            max-width: 600px;
            padding: 0 1.5rem 4rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* كرت الأداة الزجاجي */
        .tool-box {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* شاشة عرض كلمة المرور الناتجة */
        .result-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .result-text {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            word-break: break-all;
            padding-right: 1rem;
            font-family: var(--font-en); /* دائماً خط انجليزي لكلمات السر */
            color: #ffffff;
        }

        .result-text.placeholder-style {
            color: var(--text-muted);
            font-family: inherit;
            font-weight: 400;
            letter-spacing: 0;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: #ffffff;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .copy-btn:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            box-shadow: 0 5px 15px var(--hover-glow);
        }

        /* شريط مقياس القوة */
        .strength-meter {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: flex;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: all 0.4s ease;
        }

        /* التحكم بالطول Slider */
        .setting-row {
            margin-bottom: 1.8rem;
        }

        .label-space {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            font-weight: 600;
            font-size: 1rem;
        }

        .length-val {
            color: #3b82f6;
            font-family: var(--font-en);
            font-weight: 700;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.08);
            height: 8px;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            box-shadow: 0 0 10px var(--hover-glow);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* خيارات الـ Checkboxes التخصيصية */
        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            margin-bottom: 2.5rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        .checkbox-container input {
            width: 20px;
            height: 20px;
            accent-color: #7c3aed;
            cursor: pointer;
        }

        /* زر التوليد الكبير الفخم */
        .generate-btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 16px;
            background: var(--accent-gradient);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 10px 20px var(--hover-glow);
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px var(--hover-glow);
        }

        .generate-btn:active {
            transform: translateY(1px);
        }

        /* إشعار التوست المنبثق عند النسخ */
        .toast {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(124, 58, 237, 0.9);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            bottom: 40px;
        }

        /* مساحات إعلانية مدروسة للمردود المالي */
        .ad-slot {
            width: 100%;
            min-height: 90px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px dashed rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin: 2rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            font-family: var(--font-en);
        }

        @media (max-width: 480px) {
            .tool-box { padding: 1.8rem 1.2rem; }
            .checkbox-grid { grid-template-columns: 1fr; gap: 0.9rem; }
            header h1 { font-size: 1.9rem; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="back-btn" id="backBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            <span>الرئيسية</span>
        </a>
        <button class="lang-btn" onclick="toggleLanguage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
            <span id="langText">English</span>
        </button>
    </nav>

    <div class="container">
        <header>
            <h1 id="toolTitle">مولد كلمات المرور</h1>
            <p id="toolDesc">أنشئ كلمات مرور قوية جداً وغير قابلة للاختراق بنقرة واحدة</p>
        </header>

        <div class="ad-slot">Advertisement Space (Top Banner)</div>

        <div class="tool-box">
            <div class="result-container">
                <div class="result-text placeholder-style" id="resultDisplay">انقر على زر التوليد بالأسفل...</div>
                <button class="copy-btn" onclick="copyPassword()" id="copyBtn" title="نسخ كلمة السر">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
            </div>

            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>

            <div class="setting-row">
                <div class="label-space">
                    <span id="labelLength">طول كلمة المرور</span>
                    <span class="length-val" id="lengthVal">16</span>
                </div>
                <input type="range" id="lengthSlider" min="8" max="45" value="16" oninput="updateSliderVal()">
            </div>

            <div class="checkbox-grid">
                <label class="checkbox-container">
                    <input type="checkbox" id="uppercase" checked>
                    <span id="optUpper">أحرف كبيرة (A-Z)</span>
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="lowercase" checked>
                    <span id="optLower">أحرف صغيرة (a-z)</span>
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="numbers" checked>
                    <span id="optNumbers">أرقام (0-9)</span>
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="symbols">
                    <span id="optSymbols">رموز خاصة (!@#$)</span>
                </label>
            </div>

            <button class="generate-btn" onclick="generatePassword()" id="genBtn">توليد كلمة سر آمنة ✨</button>
        </div>

        <div class="ad-slot">Advertisement Space (Bottom Banner)</div>
    </div>

    <div class="toast" id="toastNotification">تم نسخ كلمة المرور بنجاح!</div>

    <script>
        const translations = {
            ar: {
                langBtn: "English",
                backBtn: "الرئيسية",
                title: "مولد كلمات المرور الآمنة | ToolnestHQ",
                toolTitle: "مولد كلمات المرور",
                toolDesc: "أنشئ كلمات مرور قوية جداً وغير قابلة للاختراق بنقرة واحدة",
                placeholder: "انقر على زر التوليد بالأسفل...",
                labelLength: "طول كلمة المرور",
                optUpper: "أحرف كبيرة (A-Z)",
                optLower: "أحرف صغيرة (a-z)",
                optNumbers: "أرقام (0-9)",
                optSymbols: "رموز خاصة (!@#$)",
                genBtn: "توليد كلمة سر آمنة ✨",
                toast: "تم نسخ كلمة المرور بنجاح!",
                alertSelect: "يرجى اختيار خيار واحد على الأقل لتوليد كلمة السر!"
            },
            en: {
                langBtn: "العربية",
                backBtn: "Home",
                title: "Secure Password Generator | ToolnestHQ",
                toolTitle: "Password Generator",
                toolDesc: "Generate highly secure, uncrackable passwords with a single click",
                placeholder: "Click generate button below...",
                labelLength: "Password Length",
                optUpper: "Uppercase Letters (A-Z)",
                optLower: "Lowercase Letters (a-z)",
                optNumbers: "Numbers (0-9)",
                optSymbols: "Special Symbols (!@#$)",
                genBtn: "Generate Secure Password ✨",
                toast: "Password copied to clipboard!",
                alertSelect: "Please select at least one option to generate password!"
            }
        };

        let currentLang = 'ar';

        function toggleLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';

            document.title = translations[currentLang].title;
            document.getElementById('langText').textContent = translations[currentLang].langBtn;
            document.getElementById('backBtn').querySelector('span').textContent = translations[currentLang].backBtn;
            document.getElementById('toolTitle').textContent = translations[currentLang].toolTitle;
            document.getElementById('toolDesc').textContent = translations[currentLang].toolDesc;
            document.getElementById('labelLength').textContent = translations[currentLang].labelLength;
            document.getElementById('optUpper').textContent = translations[currentLang].optUpper;
            document.getElementById('optLower').textContent = translations[currentLang].optLower;
            document.getElementById('optNumbers').textContent = translations[currentLang].optNumbers;
            document.getElementById('optSymbols').textContent = translations[currentLang].optSymbols;
            document.getElementById('genBtn').textContent = translations[currentLang].genBtn;
            
            // تحديث شاشة العرض الترحيبية فقط إذا لم يتم إنشاء كلمة مرور بعد
            const display = document.getElementById('resultDisplay');
            if (display.classList.contains('placeholder-style')) {
                display.textContent = translations[currentLang].placeholder;
            }

            // تعديل أيقونة الرجوع بناءً على الاتجاه لشكل جمالي متناسق
            const svgNav = document.getElementById('backBtn').querySelector('svg');
            if(currentLang === 'en') {
                svgNav.style.transform = 'rotate(0deg)';
            } else {
                svgNav.style.transform = 'rotate(180deg)';
            }
        }

        // تحديث الرقم المعروض فوق شريط السحب فورياً عند السحب
        function updateSliderVal() {
            const slider = document.getElementById('lengthSlider');
            document.getElementById('lengthVal').textContent = slider.value;
        }

        // منطق توليد كلمة السر العشوائية والمشفرة
        function generatePassword() {
            const length = document.getElementById('lengthSlider').value;
            const hasUpper = document.getElementById('uppercase').checked;
            const hasLower = document.getElementById('lowercase').checked;
            const hasNumber = document.getElementById('numbers').checked;
            const hasSymbol = document.getElementById('symbols').checked;

            const upperChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowerChars = "abcdefghijklmnopqrstuvwxyz";
            const numberChars = "0123456789";
            const symbolChars = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

            let allowedChars = "";
            if (hasUpper) allowedChars += upperChars;
            if (hasLower) allowedChars += lowerChars;
            if (hasNumber) allowedChars += numberChars;
            if (hasSymbol) allowedChars += symbolChars;

            if (allowedChars === "") {
                alert(translations[currentLang].alertSelect);
                return;
            }

            let password = "";
            // استخدام حلقة مشفرة آمنة عشوائياً
            for (let i = 0; i < length; i++) {
                const randomIndex = Math.floor(Math.random() * allowedChars.length);
                password += allowedChars[randomIndex];
            }

            const display = document.getElementById('resultDisplay');
            display.textContent = password;
            display.classList.remove('placeholder-style');

            evaluateStrength(password, hasUpper, hasLower, hasNumber, hasSymbol, length);
        }

        // تقييم قوة كلمة السر وتغيير لون الشريط المقياسي ديناميكياً
        function evaluateStrength(pass, upper, lower, num, sym, len) {
            const bar = document.getElementById('strengthBar');
            let score = 0;

            if (len >= 12) score++;
            if (len >= 18) score++;
            if (upper && lower) score++;
            if (num) score++;
            if (sym) score++;

            if (score <= 2) {
                bar.style.width = "33%";
                bar.style.backgroundColor = "var(--weak)";
            } else if (score <= 4) {
                bar.style.width = "66%";
                bar.style.backgroundColor = "var(--medium)";
            } else {
                bar.style.width = "100%";
                bar.style.backgroundColor = "var(--strong)";
            }
        }

        // ميزة النسخ الأنيقة للحافظة مع إظهار توست منبثق فخم
        function copyPassword() {
            const display = document.getElementById('resultDisplay');
            if (display.classList.contains('placeholder-style')) return;

            const textToCopy = display.textContent;
            navigator.clipboard.writeText(textToCopy).then(() => {
                const toast = document.getElementById('toastNotification');
                toast.textContent = translations[currentLang].toast;
                toast.classList.add('show');
                
                setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            });
        }
    </script>
</body>
</html>
