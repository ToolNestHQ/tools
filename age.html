<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة العمر - ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-panel: rgba(255, 255, 255, 0.03);
            --glass-card: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-pure: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
            --body-bg: #070a12;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .dashboard-panel {
            background: var(--glass-panel);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px);
            border-radius: 32px;
            padding: 40px 25px;
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6);
            text-align: center;
            position: relative;
        }

        /* زر الرجوع للرئيسية */
        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            color: var(--text-pure);
            padding: 8px 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .dashboard-header {
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .dashboard-header h1 {
            margin: 0 0 5px 0;
            font-size: 26px;
            font-weight: 800;
        }

        .dashboard-header p {
            margin: 0;
            color: var(--text-dim);
            font-size: 14px;
        }

        /* صندوق الإدخال الزجاجي */
        .input-group {
            margin-bottom: 25px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--text-dim);
            padding-right: 5px;
        }

        input[type="date"] {
            width: 100%;
            padding: 15px;
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-pure);
            font-size: 16px;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            text-align: center;
            transition: all 0.3s;
        }

        input[type="date"]:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        /* زر الحساب الشفاف الضبابي */
        .calc-btn {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            color: var(--text-pure);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .calc-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* شبكة النتائج الزجاجية */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 30px;
            display: none; /* مخفي حتى يتم الحساب */
        }

        .result-box {
            background: var(--glass-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px 10px;
        }

        .result-val {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .result-lbl {
            font-size: 12px;
            color: var(--text-dim);
        }
    </style>
</head>
<body>

    <div class="dashboard-panel">
        <!-- زر العودة للرئيسية -->
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> الرئيسية</a>

        <div class="dashboard-header">
            <h1>حاسبة العمر الدقيقة</h1>
            <p>احسب عمرك بالسنوات والأشهر والأيام بلملمة عين</p>
        </div>

        <div class="input-group">
            <label for="birthdate">اختر تاريخ ميلادك:</label>
            <input type="date" id="birthdate">
        </div>

        <button class="calc-btn" onclick="calculateAge()">احسب الآن</button>

        <!-- صناديق عرض النتيجة الشفافة -->
        <div class="result-grid" id="resultGrid">
            <div class="result-box">
                <div class="result-val" id="years">-</div>
                <div class="result-lbl">سنوات</div>
            </div>
            <div class="result-box">
                <div class="result-val" id="months">-</div>
                <div class="result-lbl">أشهر</div>
            </div>
            <div class="result-box">
                <div class="result-val" id="days">-</div>
                <div class="result-lbl">أيام</div>
            </div>
        </div>
    </div>

    <script>
        function calculateAge() {
            const birthdateInput = document.getElementById('birthdate').value;
            if (!birthdateInput) {
                alert('الرجاء اختيار تاريخ الميلاد أولاً!');
                return;
            }

            const birthDate = new Date(birthdateInput);
            const today = new Date();

            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                // الحصول على أيام الشهر السابق
                const previousMonth = new Date(today.getFullYear(), today.getMonth(), 0).getDate();
                days += previousMonth;
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            // عرض النتيجة وتحريك الشبكة لتظهر
            document.getElementById('years').innerText = years;
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;
            
            document.getElementById('resultGrid').style.display = 'grid';
        }
    </script>

</body>
</html>
