<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-pure: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.55);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #060813; /* أساس داكن جداً */
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* --- تأثير أمواج الألوان المتحركة الفخمة والناعمة في الخلفية --- */
        .color-bg-glow {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(120px); /* تنعيم الألوان عشان تطلع مثل الضباب */
            opacity: 0.4; /* هادئة وغير مزعجة للعين */
        }

        /* الكتلة الملونة الأولى (أزرق نيوني فخم) */
        .color-blob-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1e3a8a 0%, transparent 70%);
            top: -10%;
            left: -10%;
            animation: wave1 20s infinite alternate ease-in-out;
        }

        /* الكتلة الملونة الثانية (بنفسجي غامق ملكي) */
        .color-blob-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #4c1d95 0%, transparent 70%);
            bottom: -20%;
            right: -10%;
            animation: wave2 25s infinite alternate ease-in-out;
        }

        /* حركة الأمواج الناعمة */
        @keyframes wave1 {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.2); }
        }

        @keyframes wave2 {
            0% { transform: translate(0, 0) scale(1.1); }
            100% { transform: translate(-80px, -60px) scale(0.9); }
        }

        .glass-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 2; /* فوق الألوان */
        }

        /* كرت الزجاج الشفاف اللي يعكس الألوان وراه */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(35px); /* ضباب قوي يدمج الألوان وراه بشكل ساحر */
            -webkit-backdrop-filter: blur(35px);
            border-radius: 28px;
            padding: 50px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: block;
            max-width: 380px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-card:hover {
            transform: translateY(-6px);
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 50px 120px rgba(0, 0, 0, 0.6);
        }

        .card-icon {
            font-size: 65px;
            color: var(--text-pure);
            margin-bottom: 25px;
            opacity: 0.95;
        }

        .title-ar {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-pure);
            line-height: 1.2;
        }

        .title-en {
            margin: 8px 0 20px 0;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-pure);
            direction: ltr;
            display: block;
        }

        .glass-card p {
            color: var(--text-dim);
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <!-- الألوان المائعة والمتحركة في الخلفية -->
    <div class="color-bg-glow">
        <div class="color-blob-1"></div>
        <div class="color-blob-2"></div>
    </div>

    <div class="glass-container">
        <a href="qr.html" class="glass-card">
            <div class="card-icon"><i class="fa-solid fa-qrcode"></i></div>
            <span class="title-ar">صانع الباركود</span>
            <span class="title-en">(QR Code)</span>
            <p>أنشئ رموز QR مخصصة لروابطك ونصوصك بسهولة وبأعلى دقة</p>
        </a>
    </div>

</body>
</html>
