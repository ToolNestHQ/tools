<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNestHQ</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05); /* خلفية بيضاء شفافة */
            --glass-border: rgba(255, 255, 255, 0.1); /* حدود ناعمة جداً */
            --text-pure: #ffffff; /* أبيض ناصع */
            --text-dim: rgba(255, 255, 255, 0.6); /* أبيض خافت للوصف */
            --body-bg: #0b0f19; /* خلفية داكنة سادة لبروز تأثير الضباب */
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            color: var(--text-pure);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .glass-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* كرت الزجاج الشفاف الضبابي الفخم */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(25px); /* تأثير ضبابي قوي للزجاج */
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 45px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            display: block;
            max-width: 400px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .card-icon {
            font-size: 60px;
            color: var(--text-pure);
            margin-bottom: 25px;
            opacity: 0.95;
        }

        /* تنسيق العنوان العربي */
        .title-ar {
            margin: 0;
            font-size: 26px;
            font-weight: 700;
            color: var(--text-pure);
            line-height: 1.2;
        }

        /* تنسيق العنوان الإنجليزي المرتب تحت العربي مباشرة */
        .title-en {
            margin: 8px 0 20px 0;
            font-size: 24px;
            font-weight: 600;
            color: var(--text-pure);
            direction: ltr;
            display: block;
        }

        /* وصف الأداة */
        .glass-card p {
            color: var(--text-dim);
            margin: 0;
            font-size: 15px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <a href="qr.html" class="glass-card">
            <div class="card-icon"><i class="fa-solid fa-qrcode"></i></div>
            <span class="title-ar">صانع الباركود</span>
            <span class="title-en">(QR Code)</span>
            <p>أنشئ رموز QR مخصصة لروابطك ونصوصك بسهولة وبأعلى دقة</p>
        </a>
    </div>

</body>
</html>
